{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white"><h3>Thêm món mới</h3></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Tên món</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá (VNĐ)</label>
                        <input type="number" name="price" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea name="description" class="form-control"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Link ảnh (URL)</label>
                        <input type="text" name="image_url" class="form-control" placeholder="https://...">
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Lưu vào thực đơn</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
